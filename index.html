<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Cert Study Portal</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
.portal-hero{text-align:center;padding:44px 24px 16px}
.portal-hero h1{font-size:2rem;font-weight:800;margin:0 0 10px;letter-spacing:-0.8px}
.portal-hero h1 span{color:var(--accent)}
.portal-hero p{color:var(--text2);font-size:1rem;margin:0}
.cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;max-width:1100px;margin:0 auto;padding:0 20px 48px}
.cert-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:var(--transition);position:relative;overflow:hidden;text-decoration:none;display:block;color:inherit}
.cert-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.18)}
.cert-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--cert-color)}
.cert-badge{display:inline-block;font-size:0.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--cert-color);color:#fff;padding:2px 8px;border-radius:20px;margin-bottom:10px}
.cert-code{font-size:1.4rem;font-weight:800;margin:4px 0}
.cert-name{font-size:0.95rem;color:var(--text2);margin-bottom:10px}
.cert-desc{font-size:0.85rem;color:var(--text2);line-height:1.5;margin-bottom:14px}
.cert-topics{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.cert-topic{font-size:0.72rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;color:var(--text2)}
.cert-footer{display:flex;justify-content:space-between;align-items:center;margin-top:4px;gap:10px}
.cert-qcount{font-size:0.8rem;color:var(--text2)}
.cert-cta{background:var(--cert-color);color:#fff;border-radius:6px;padding:7px 16px;font-size:0.85rem;font-weight:600;white-space:nowrap;display:inline-block;transition:var(--transition)}
.cert-card:hover .cert-cta{opacity:.85}
.cert-progress-wrap{margin-bottom:4px}
.cert-progress-label{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--text2);margin-bottom:5px}
.cert-progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.cert-progress-fill{height:100%;background:var(--cert-color);border-radius:3px;transition:width .5s}
.cert-card.coming-soon{opacity:.65}
.coming-soon-badge{position:absolute;top:14px;right:14px;font-size:0.7rem;font-weight:700;background:var(--border);color:var(--text2);padding:2px 8px;border-radius:20px}
.level-filter-bar{display:flex;justify-content:center;gap:8px;padding:16px 20px 22px;flex-wrap:wrap}
.level-pill{background:var(--card);border:1.5px solid var(--border);color:var(--text2);padding:6px 18px;border-radius:999px;cursor:pointer;font-size:0.82rem;font-weight:600;transition:var(--transition);white-space:nowrap}
.level-pill:hover{border-color:var(--accent);color:var(--text)}
.level-pill.active{background:var(--accent);border-color:var(--accent);color:#111}
.level-count{font-size:0.72rem;opacity:0.75;font-weight:500;margin-left:3px}
.portal-feedback-btn{font-size:0.78rem;padding:6px 13px;text-decoration:none;display:inline-flex;align-items:center;gap:5px;vertical-align:middle}
@media(max-width:640px){
  .portal-hero{padding:28px 12px 10px}
  .portal-hero h1{font-size:1.6rem}
  .portal-hero p{font-size:0.92rem}
  .level-filter-bar{justify-content:center;flex-wrap:wrap;overflow:visible;padding:12px 12px 14px;gap:6px}
  .level-pill{padding:5px 11px;font-size:0.76rem;flex:0 0 auto}
  .cert-grid{grid-template-columns:1fr;gap:12px;padding:0 12px 30px}
  .cert-card{padding:16px}
  .cert-code{font-size:1.2rem}
  .cert-footer{flex-wrap:wrap}
}
</style>
<script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<nav>
  <div class="nav-top">
    <span class="nav-title-cert">&#x2601; AWS Cert Study Portal</span>
    <a class="btn portal-feedback-btn" href="feedback.html">&#x1F4AC; Feedback</a>
    <button class="theme-toggle" id="theme-toggle" onclick="togglePortalTheme()" title="Toggle light/dark mode">&#x1F319;</button>
  </div>
</nav>
<div class="portal-hero">
  <h1>Choose your <span>AWS Certification</span></h1>
  <p>Practice with realistic quiz flows, track your mastery, and build confidence before exam day.</p>
</div>
<div class="level-filter-bar" id="level-filter-bar"></div>
<div class="cert-grid" id="cert-grid"></div>
<script>
const CERTS = [
  { id:'clf-c02', code:'CLF-C02', name:'Cloud Practitioner', level:'Foundational', color:'#64748b', total:0, href:'coming-soon.html?cert=clf-c02', built:false, topics:['Cloud Concepts','Billing','Security','Core Services'], desc:'Foundational understanding of AWS cloud concepts and value.' },
  { id:'aif-c01', code:'AIF-C01', name:'AI Practitioner', level:'Foundational', color:'#64748b', total:0, href:'coming-soon.html?cert=aif-c01', built:false, topics:['GenAI','ML Basics','AWS AI Services','Responsible AI'], desc:'Foundational AI and generative AI knowledge on AWS.' },
  { id:'dva-c02', code:'DVA-C02', name:'Developer', level:'Associate', color:'#06b6d4', total:476, href:'dva-c02.html', built:true, topics:['Lambda','DynamoDB','API Gateway','CI/CD'], desc:'Develop, deploy, and debug cloud-based applications.' },
  { id:'saa-c03', code:'SAA-C03', name:'Solutions Architect', level:'Associate', color:'#06b6d4', total:35, href:'saa-c03.html', built:true, topics:['VPC','EC2','S3','RDS'], desc:'Design resilient and cost-optimized AWS architectures.' },
  { id:'dea-c01', code:'DEA-C01', name:'Data Engineer', level:'Associate', color:'#06b6d4', total:0, href:'coming-soon.html?cert=dea-c01', built:false, topics:['Data Lakes','ETL','Streaming','Governance'], desc:'Design and build data pipelines and analytics solutions.' },
  { id:'cloudops-c01', code:'CloudOps-C01', name:'CloudOps Engineer', level:'Associate', color:'#06b6d4', total:0, href:'coming-soon.html?cert=cloudops-c01', built:false, topics:['Monitoring','Operations','Resilience','Security'], desc:'Deploy, manage, and operate workloads on AWS.' },
  { id:'mla-c01', code:'MLA-C01', name:'Machine Learning Engineer', level:'Associate', color:'#06b6d4', total:0, href:'coming-soon.html?cert=mla-c01', built:false, topics:['Feature Engineering','Training','MLOps','Inference'], desc:'Build, train, and deploy machine learning workloads.' },
  { id:'genai-developer-pro', code:'GenAI-Dev-Pro', name:'Generative AI Developer', level:'Professional', color:'#f97316', total:0, href:'coming-soon.html?cert=genai-developer-pro', built:false, topics:['LLM Integration','Prompt Engineering','Agents','Fine-tuning'], desc:'Build and deploy production-ready AI solutions using generative AI.' },
  { id:'sap-c02', code:'SAP-C02', name:'Solutions Architect', level:'Professional', color:'#f97316', total:0, href:'coming-soon.html?cert=sap-c02', built:false, topics:['Enterprise Architecture','Migration','Cost Control','Hybrid'], desc:'Advanced design for complex, large-scale AWS environments.' },
  { id:'dop-c02', code:'DOP-C02', name:'DevOps Engineer', level:'Professional', color:'#f97316', total:0, href:'coming-soon.html?cert=dop-c02', built:false, topics:['Release Automation','Observability','Security','Reliability'], desc:'Operate and evolve delivery pipelines and production systems.' },
  { id:'ans-c01', code:'ANS-C01', name:'Advanced Networking', level:'Specialty', color:'#ec4899', total:0, href:'coming-soon.html?cert=ans-c01', built:false, topics:['Hybrid Networking','Routing','DNS','Connectivity'], desc:'Advanced design and operation of AWS and hybrid networking.' },
  { id:'mls-c01', code:'MLS-C01', name:'Machine Learning', level:'Specialty', color:'#ec4899', total:0, href:'coming-soon.html?cert=mls-c01', built:false, topics:['ML Problem Framing','Modeling','Deployment','Optimization'], desc:'Advanced machine learning design and operations on AWS.' },
  { id:'scs-c02', code:'SCS-C02', name:'Security', level:'Specialty', color:'#ec4899', total:35, href:'scs-c02.html', built:true, topics:['IAM','KMS','CloudTrail','GuardDuty'], desc:'Secure AWS workloads with layered controls and governance.' }
];

var currentLevel = 'all';

function readProgress(certId){try{var raw=localStorage.getItem('aws-quiz-progress-'+certId);if(!raw)return{mastered:0,seen:0};var p=JSON.parse(raw);var mastered=0,seen=0;for(var key in p){var e=p[key];if(e&&(e.correct>0||e.incorrect>0))seen++;if(e&&e.correct>=1)mastered++;}return{mastered:mastered,seen:seen};}catch(e){return{mastered:0,seen:0};}}

function filterCerts(level) {
  currentLevel = level;
  document.querySelectorAll('.level-pill').forEach(function(p){ p.classList.toggle('active', p.dataset.level === level); });
  buildCards();
}

function buildFilterBar() {
  var bar = document.getElementById('level-filter-bar');
  var levels = ['all','Foundational','Associate','Professional','Specialty'];
  var labels = {all:'All'};
  var counts = {all:CERTS.length};
  levels.slice(1).forEach(function(l){ counts[l] = CERTS.filter(function(c){return c.level===l;}).length; labels[l]=l; });
  bar.innerHTML = levels.map(function(l){
    return '<button class="level-pill'+(l==='all'?' active':'')+'" data-level="'+l+'" onclick="filterCerts(\''+l+'\')">'+
      (l==='all'?'All':l)+'<span class="level-count">('+counts[l]+')</span></button>';
  }).join('');
}

function buildCards(){
  var grid = document.getElementById('cert-grid');
  var list = currentLevel === 'all' ? CERTS : CERTS.filter(function(c){ return c.level === currentLevel; });
  var html = '';
  for(var i=0;i<list.length;i++){
    var cert=list[i];
    var prog=readProgress(cert.id);
    var pct=cert.total>0?Math.round((prog.mastered/cert.total)*100):0;
    var topics=cert.topics.map(function(t){return '<span class="cert-topic">'+t+'</span>';}).join('');
    var progressHtml=cert.built?('<div class="cert-progress-wrap"><div class="cert-progress-label"><span>Mastery</span><span>'+prog.mastered+' / '+cert.total+'</span></div><div class="cert-progress-bar"><div class="cert-progress-fill" style="width:'+pct+'%"></div></div></div>'):'';
    html+='<a class="cert-card'+(cert.built?'':' coming-soon')+'" href="'+cert.href+'" style="--cert-color:'+cert.color+'">'+
      (!cert.built?'<span class="coming-soon-badge">Coming Soon</span>':'')+
      '<div class="cert-badge">'+cert.level+'</div>'+
      '<div class="cert-code">'+cert.code+'</div>'+
      '<div class="cert-name">'+cert.name+'</div>'+
      '<div class="cert-desc">'+cert.desc+'</div>'+
      '<div class="cert-topics">'+topics+'</div>'+
      progressHtml+
      '<div class="cert-footer">'+
        '<span class="cert-qcount">'+(cert.total>0?cert.total+' questions':'In progress')+'</span>'+
        '<span class="cert-cta">'+(cert.built?'Study Now &rarr;':'View Status &rarr;')+'</span>'+
      '</div>'+
    '</a>';
  }
  grid.innerHTML = html;
}

function togglePortalTheme(){var html=document.documentElement;var current=html.getAttribute('data-theme');var next=current==='dark'?'light':'dark';html.setAttribute('data-theme',next);localStorage.setItem('theme',next);document.getElementById('theme-toggle').textContent=next==='dark'?'🌙':'☀️';}
(function(){var t=localStorage.getItem('theme')||'dark';document.getElementById('theme-toggle').textContent=t==='dark'?'🌙':'☀️';})();
buildFilterBar();
buildCards();
</script>
</body>
</html>
