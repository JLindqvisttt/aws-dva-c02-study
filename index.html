<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Cert Study Portal</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
body{background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 10%,var(--bg)) 0%,var(--bg) 420px)}
.portal-hero{text-align:center;padding:52px 24px 16px;position:relative;overflow:hidden}
.portal-hero .portal-actions{position:absolute;top:16px;right:20px;display:flex;align-items:center;gap:8px;z-index:10}
.portal-hero::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(240,150,42,0.08) 0%,transparent 65%);animation:heroFloat 14s ease-in-out infinite;top:-320px;left:-180px;pointer-events:none;z-index:0}
.portal-hero::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(240,150,42,0.05) 0%,transparent 65%);animation:heroFloat 14s ease-in-out infinite 7s reverse;bottom:-220px;right:-80px;pointer-events:none;z-index:0}
.portal-hero > *{position:relative;z-index:1}
@keyframes heroFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(120px,80px) scale(1.15)}66%{transform:translate(60px,-60px) scale(0.9)}}
.portal-hero h1{font-size:2rem;font-weight:800;margin:0 0 10px;letter-spacing:-0.8px}
.portal-hero h1 span{color:var(--accent)}
.portal-hero p{color:var(--text2);font-size:1rem;margin:0}
.cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;max-width:1100px;margin:0 auto;padding:0 20px 48px}
.cert-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:var(--transition);position:relative;overflow:hidden;text-decoration:none;display:block;color:inherit}
.cert-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.18)}
.cert-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--cert-color)}
.cert-badge{display:inline-block;font-size:0.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--cert-color);color:#fff;padding:2px 8px;border-radius:20px;margin-bottom:10px}
.cert-code{font-size:1.4rem;font-weight:800;margin:4px 0}
.cert-name{font-size:0.95rem;color:var(--text2);margin-bottom:10px}
.cert-desc{font-size:0.85rem;color:var(--text2);line-height:1.5;margin-bottom:14px}
.cert-topics{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.cert-topic{font-size:0.72rem;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:2px 9px;color:var(--text2)}
.cert-footer{display:flex;justify-content:space-between;align-items:center;margin-top:4px;gap:10px}
.cert-qcount{font-size:0.8rem;color:var(--text2)}
.cert-cta{background:var(--cert-color);color:#fff;border-radius:999px;padding:7px 18px;font-size:0.85rem;font-weight:600;white-space:nowrap;display:inline-block;transition:var(--transition);box-shadow:0 2px 8px color-mix(in srgb,var(--cert-color) 40%,transparent)}
.cert-card:hover .cert-cta{filter:brightness(0.88)}
.cert-progress-wrap{margin-bottom:12px}
.prog-ring-row{display:flex;align-items:center;gap:14px}
.prog-ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;flex-shrink:0}
.prog-ring{display:block}
.prog-ring-bg{fill:none;stroke:var(--border);stroke-width:3.5}
.prog-ring-fill{fill:none;stroke-width:3.5;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 0.9s ease}
.prog-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.prog-ring-pct{font-size:0.66rem;font-weight:800;color:var(--text);line-height:1.1}
.prog-ring-labels{display:flex;flex-direction:column;gap:3px}
.prog-ring-count{font-size:0.82rem;font-weight:700;color:var(--text)}
.prog-ring-sub{font-size:0.7rem;color:var(--text2)}
.cert-card.coming-soon{filter:grayscale(0.3);opacity:.8}
.cert-card.coming-soon:hover{filter:grayscale(0);opacity:1}
:root .cert-card{background:color-mix(in srgb, var(--cert-color) 5%, var(--card))}
[data-theme="light"] .cert-card{background:var(--card)}
.coming-soon-badge{position:absolute;top:14px;left:14px;font-size:0.68rem;font-weight:700;background:color-mix(in srgb,var(--cert-color) 12%,var(--card2));color:var(--text2);padding:3px 10px;border-radius:999px;backdrop-filter:blur(4px);letter-spacing:0.02em;z-index:2}
.cert-card.coming-soon .cert-badge{margin-top:22px}
.level-filter-bar{display:flex;justify-content:center;gap:8px;padding:16px 20px 22px;flex-wrap:wrap}
.level-pill{background:var(--card);border:1.5px solid var(--border);color:var(--text2);padding:6px 18px;border-radius:999px;cursor:pointer;font-size:0.82rem;font-weight:600;transition:var(--transition);white-space:nowrap}
.level-pill:hover{border-color:var(--accent);color:var(--text)}
.level-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.level-count{font-size:0.72rem;opacity:0.75;font-weight:500;margin-left:3px}
.portal-feedback-btn{font-size:0.8rem;font-weight:600;padding:7px 16px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;border-radius:999px;border:1.5px solid var(--border);color:var(--text2);transition:var(--transition);background:transparent}
.portal-feedback-btn:hover{border-color:var(--text2);color:var(--text)}
.cert-card-badge-img{position:absolute;top:12px;right:12px;width:44px;height:44px;object-fit:contain;border-radius:10px;background:color-mix(in srgb,var(--cert-color) 16%,var(--card2));padding:5px;transition:transform 0.2s ease,opacity 0.2s ease;z-index:1;opacity:0.65}
.cert-card:hover .cert-card-badge-img{transform:scale(1.07);opacity:1}
@media(max-width:640px){
  .portal-hero{padding:28px 12px 10px}
  .portal-hero h1{font-size:1.6rem}
  .portal-hero p{font-size:0.92rem}
  .level-filter-bar{justify-content:center;flex-wrap:wrap;overflow:visible;padding:12px 12px 14px;gap:6px}
  .level-pill{padding:5px 11px;font-size:0.76rem;flex:0 0 auto}
  .cert-grid{grid-template-columns:1fr;gap:12px;padding:0 12px 30px}
  .cert-card{padding:16px}
  .cert-code{font-size:1.2rem}
  .cert-card-badge-img{width:36px;height:36px}
  .prog-ring-wrap,.prog-ring{width:44px;height:44px}
  .cert-footer{flex-wrap:wrap}
}
.portal-footer{text-align:center;padding:24px 20px 32px;color:var(--text2);font-size:0.75rem;letter-spacing:0.02em}
.portal-footer a{color:var(--text2);text-decoration:none;transition:var(--transition)}
.portal-footer a:hover{color:var(--text)}
</style>
<script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<div class="portal-hero">
  <div class="portal-actions">
    <a class="portal-feedback-btn" href="feedback.html">&#x1F4AC; Feedback</a>
    <button class="theme-toggle" id="theme-toggle" onclick="togglePortalTheme()" title="Toggle light/dark mode">&#x1F319;</button>
  </div>
  <h1>Choose your <span>AWS Certification</span></h1>
  <p>Practice with realistic quiz flows, track your mastery, and build confidence before exam day.</p>
</div>
<div class="level-filter-bar" id="level-filter-bar"></div>
<div class="cert-grid" id="cert-grid"></div>
<footer class="portal-footer">Built for learning &mdash; not affiliated with Amazon Web Services</footer>
<script>
const BD='https://d1.awsstatic.com/onedam/marketing-channels/website/aws/en_US/certification/approved/images/certification-badges/';
const CERTS = [
  { id:'clf-c02', code:'CLF-C02', name:'Cloud Practitioner', level:'Foundational', color:'#64748b', total:0, href:'coming-soon.html?cert=clf-c02', built:false, topics:['Cloud Concepts','Billing','Security','Core Services'], desc:'Foundational understanding of AWS cloud concepts and value.', badge:BD+'450x520_lower.156c60f871fa39a09e89586c7520d404d18d13af.png' },
  { id:'aif-c01', code:'AIF-C01', name:'AI Practitioner', level:'Foundational', color:'#64748b', total:0, href:'coming-soon.html?cert=aif-c01', built:false, topics:['GenAI','ML Basics','AWS AI Services','Responsible AI'], desc:'Foundational AI and generative AI knowledge on AWS.', badge:BD+'1268_AWS_Cert_Template_badges_AI-Practitioner.aab7160e1a9809a5f39199b24ee014bc2598a4d1.png' },
  { id:'dva-c02', code:'DVA-C02', name:'Developer', level:'Associate', color:'#06b6d4', total:476, href:'dva-c02.html', built:true, topics:['Lambda','DynamoDB','API Gateway','SQS/SNS','CodePipeline'], desc:'Develop, deploy, and debug cloud-based applications.', badge:BD+'1268_AWS_Cert_Template_badges_Developer.48b58911afa0d71c5655bbaf91fa5442bcc32f5d.png' },
  { id:'saa-c03', code:'SAA-C03', name:'Solutions Architect', level:'Associate', color:'#06b6d4', total:35, href:'saa-c03.html', built:true, topics:['VPC','EC2+Auto Scaling','S3+CloudFront','RDS+Aurora','Route 53'], desc:'Design resilient and cost-optimized AWS architectures.', badge:BD+'1268_AWS_Cert_Template_badges_Solutions-Architect-Associate.b9f37074b41d1f226d896be5ae25c2d53a3d018a.png' },
  { id:'dea-c01', code:'DEA-C01', name:'Data Engineer', level:'Associate', color:'#06b6d4', total:0, href:'coming-soon.html?cert=dea-c01', built:false, topics:['Data Lakes','ETL','Streaming','Governance'], desc:'Design and build data pipelines and analytics solutions.', badge:BD+'1268_AWS_Cert_Template_badges_Data-Engineer-Associate.9fbc85c55c859477142224b72b9c85e5f652bd32.png' },
  { id:'cloudops-c01', code:'CloudOps-C01', name:'CloudOps Engineer', level:'Associate', color:'#06b6d4', total:0, href:'coming-soon.html?cert=cloudops-c01', built:false, topics:['Monitoring','Operations','Resilience','Security'], desc:'Deploy, manage, and operate workloads on AWS.', badge:BD+'AWS_Cert_Template_badges_CloudOps-Associate.cf2d56533d61c33192dfa167dace6f7ade7ae81d.png' },
  { id:'mla-c01', code:'MLA-C01', name:'Machine Learning Engineer', level:'Associate', color:'#06b6d4', total:0, href:'coming-soon.html?cert=mla-c01', built:false, topics:['Feature Engineering','Training','MLOps','Inference'], desc:'Build, train, and deploy machine learning workloads.', badge:BD+'1268_AWS_Cert_Template_badges_Machine-Learning-Engineer-Associate.a1b26660e12e04d271aa95ca27d0466c05f47267.png' },
  { id:'genai-developer-pro', code:'GenAI-Dev-Pro', name:'Generative AI Developer', level:'Professional', color:'#f97316', total:0, href:'coming-soon.html?cert=genai-developer-pro', built:false, topics:['LLM Integration','Prompt Engineering','Agents','Fine-tuning'], desc:'Build and deploy production-ready AI solutions using generative AI.', badge:BD+'AWS_Cert_Template_badges_Generative-AI-Developer.71272f99ee39092fd6fe7a119330dad479d67ca4.png' },
  { id:'sap-c02', code:'SAP-C02', name:'Solutions Architect', level:'Professional', color:'#f97316', total:0, href:'coming-soon.html?cert=sap-c02', built:false, topics:['Enterprise Architecture','Migration','Cost Control','Hybrid'], desc:'Advanced design for complex, large-scale AWS environments.', badge:BD+'1268_AWS_Cert_Template_badges_Solutions-Architect-Professional.e21d85644aef79d8795c2be140a88f9127cd80bf.png' },
  { id:'dop-c02', code:'DOP-C02', name:'DevOps Engineer', level:'Professional', color:'#f97316', total:0, href:'coming-soon.html?cert=dop-c02', built:false, topics:['Release Automation','Observability','Security','Reliability'], desc:'Operate and evolve delivery pipelines and production systems.', badge:BD+'1268_AWS_Cert_Template_badges_DevOps-Engineer.dca519446f0ce62e25dd4e47fec830c73e7e7393.png' },
  { id:'ans-c01', code:'ANS-C01', name:'Advanced Networking', level:'Specialty', color:'#ec4899', total:0, href:'coming-soon.html?cert=ans-c01', built:false, topics:['Hybrid Networking','Routing','DNS','Connectivity'], desc:'Advanced design and operation of AWS and hybrid networking.', badge:BD+'1268_AWS_Cert_Template_badges_Adv-Networking.a8edc59ae823bcd1775a719791076b3de99cb8ee.png' },
  { id:'mls-c01', code:'MLS-C01', name:'Machine Learning', level:'Specialty', color:'#ec4899', total:0, href:'coming-soon.html?cert=mls-c01', built:false, topics:['ML Problem Framing','Modeling','Deployment','Optimization'], desc:'Advanced machine learning design and operations on AWS.', badge:BD+'AWS-CredlyBadges_Machine-Learning.b7b18deedcc86c5bc96939d3b62b1a3ed8b76c3b.png' },
  { id:'scs-c02', code:'SCS-C02', name:'Security', level:'Specialty', color:'#ec4899', total:35, href:'scs-c02.html', built:true, topics:['IAM+Policies','KMS+CloudHSM','GuardDuty','CloudTrail','WAF+Shield'], desc:'Secure AWS workloads with layered controls and governance.', badge:BD+'1268_AWS_Cert_Template_badges_Security.a496af5c816d7d0c62c830f89393ae9ce7b84601.png' }
];

var currentLevel = 'all';

function readProgress(certId){try{var raw=localStorage.getItem('aws-quiz-progress-'+certId);if(!raw)return{mastered:0,seen:0};var p=JSON.parse(raw);var mastered=0,seen=0;for(var key in p){var e=p[key];if(e&&(e.correct>0||e.incorrect>0))seen++;if(e&&e.correct>=1)mastered++;}return{mastered:mastered,seen:seen};}catch(e){return{mastered:0,seen:0};}}

function filterCerts(level) {
  currentLevel = level;
  document.querySelectorAll('.level-pill').forEach(function(p){ p.classList.toggle('active', p.dataset.level === level); });
  buildCards();
}

function buildFilterBar() {
  var bar = document.getElementById('level-filter-bar');
  var levels = ['all','Foundational','Associate','Professional','Specialty'];
  var labels = {all:'All'};
  var counts = {all:CERTS.length};
  levels.slice(1).forEach(function(l){ counts[l] = CERTS.filter(function(c){return c.level===l;}).length; labels[l]=l; });
  bar.innerHTML = levels.map(function(l){
    return '<button class="level-pill'+(l==='all'?' active':'')+'" data-level="'+l+'" onclick="filterCerts(\''+l+'\')">'+
      (l==='all'?'All':l)+'<span class="level-count">('+counts[l]+')</span></button>';
  }).join('');
}

function buildCards(){
  var grid = document.getElementById('cert-grid');
  var list = currentLevel === 'all' ? CERTS : CERTS.filter(function(c){ return c.level === currentLevel; });
  var html = '';
  for(var i=0;i<list.length;i++){
    var cert=list[i];
    var prog=readProgress(cert.id);
    var pct=cert.total>0?Math.round((prog.mastered/cert.total)*100):0;
    var topics=cert.topics.map(function(t){return '<span class="cert-topic">'+t+'</span>';}).join('');
    var C=106.81;var progressHtml=cert.built?('<div class="cert-progress-wrap"><div class="prog-ring-row"><div class="prog-ring-wrap"><svg class="prog-ring" width="52" height="52" viewBox="0 0 52 52"><circle class="prog-ring-bg" cx="26" cy="26" r="17"/><circle class="prog-ring-fill" cx="26" cy="26" r="17" style="stroke:'+cert.color+';stroke-dasharray:'+C+';stroke-dashoffset:'+(C*(1-pct/100)).toFixed(2)+'"/></svg><div class="prog-ring-inner"><span class="prog-ring-pct">'+pct+'%</span></div></div><div class="prog-ring-labels"><span class="prog-ring-count">'+prog.mastered+' / '+cert.total+'</span><span class="prog-ring-sub">questions mastered</span></div></div></div>'):'';
  html+='<a class="cert-card'+(cert.built?'':' coming-soon')+'" href="'+cert.href+'" style="--cert-color:'+cert.color+'">'+ 
      (!cert.built?'<span class="coming-soon-badge">Coming Soon</span>':'')+
      '<img class="cert-card-badge-img" src="'+cert.badge+'" alt="'+cert.code+' badge" loading="lazy">'+ 
      '<div class="cert-badge">'+cert.level+'</div>'+
      '<div class="cert-code">'+cert.code+'</div>'+
      '<div class="cert-name">'+cert.name+'</div>'+
      '<div class="cert-desc">'+cert.desc+'</div>'+
      '<div class="cert-topics">'+topics+'</div>'+
      progressHtml+
      '<div class="cert-footer">'+
        '<span class="cert-qcount">'+(cert.total>0?cert.total+' questions':'In progress')+'</span>'+
        '<span class="cert-cta">'+(cert.built?'Study Now &rarr;':'View Status &rarr;')+'</span>'+
      '</div>'+
    '</a>';
  }
  grid.innerHTML = html;
}

function togglePortalTheme(){var html=document.documentElement;var current=html.getAttribute('data-theme');var next=current==='dark'?'light':'dark';html.setAttribute('data-theme',next);localStorage.setItem('theme',next);document.getElementById('theme-toggle').textContent=next==='dark'?'🌙':'☀️';}
(function(){var t=localStorage.getItem('theme')||'dark';document.getElementById('theme-toggle').textContent=t==='dark'?'🌙':'☀️';})();
buildFilterBar();
buildCards();
</script>
</body>
</html>
